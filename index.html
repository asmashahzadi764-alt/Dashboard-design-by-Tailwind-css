<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tailwind Dashboard</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

  <!-- Section 1 -->
  <div class="w-[1000px] mx-auto mt-10 border-4 border-black bg-white p-5 flex gap-5">

    <!-- Card 1 -->
    <div class="flex-1 bg-gray-200 rounded-2xl flex justify-between items-center p-4">

      <div>
        <h3 class="text-gray-600 font-semibold">
          Active Matches
        </h3>

        <p class="text-3xl text-purple-700 font-bold mt-1">
          0
        </p>
      </div>

      <div class="w-[70px] h-[70px] rounded-xl bg-purple-100 text-purple-700 flex items-center justify-center text-3xl">
        👥
      </div>

    </div>

    <!-- Card 2 -->
    <div class="flex-1 bg-gray-200 rounded-2xl flex justify-between items-center p-4">

      <div>
        <h3 class="text-gray-600 font-semibold">
          Completed Mentorships
        </h3>

        <p class="text-3xl text-green-700 font-bold mt-1">
          0
        </p>
      </div>

      <div class="w-[70px] h-[70px] rounded-xl bg-green-100 text-green-700 flex items-center justify-center text-3xl">
        ✔
      </div>

    </div>

    <!-- Card 3 -->
    <div class="flex-1 bg-gray-200 rounded-2xl flex justify-between items-center p-4">

      <div>
        <h3 class="text-gray-600 font-semibold">
          Pending Requests
        </h3>

        <p class="text-3xl text-teal-700 font-bold mt-1">
          0
        </p>
      </div>

      <div class="w-[70px] h-[70px] rounded-xl bg-teal-100 text-teal-700 flex items-center justify-center text-3xl">
        📅
      </div>

    </div>

  </div>

</body>
</html>
